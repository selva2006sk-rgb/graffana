name: CI Pipeline

on:

  push:

    branches:

      - main

jobs:

  build:

    runs-on: ubuntu-latest

    steps:

    - uses: actions/checkout@v4

    - name: Login DockerHub

      uses: docker/login-action@v3

      with:

        username: ${{ secrets.DOCKER_USERNAME }}

        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Build Backend

      run: docker build -t username/backend:${{ github.sha }} backend/

    - name: Push Backend

      run: docker push username/backend:${{ github.sha }}
