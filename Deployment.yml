apiVersion: apps/v1

kind: Deployment

metadata:

  name: backend

  namespace: production

spec:

  replicas: 2

  selector:

    matchLabels:

      app: backend

  template:

    metadata:

      labels:

        app: backend

    spec:

      containers:

      - name: backend

        image: username/backend:v1

        ports:

        - containerPort: 3000
