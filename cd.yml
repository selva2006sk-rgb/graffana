apiVersion: argoproj.io/v1alpha1

kind: Application

metadata:

  name: three-tier

  namespace: argocd

spec:

  project: default

  source:

    repoURL: 
    targetRevision: HEAD

    path: kubernetes

  destination:

    server: https://kubernetes.default.svc

    namespace: production

  syncPolicy:

    automated:

      prune: true

      selfHeal: true
